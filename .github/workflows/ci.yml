name: CI smoke run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Smoke test: runs the replication pipeline end-to-end via the Snakefile.
# Large inputs should be cached via actions/cache@v4 — see data/README.md.

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip CI if template has not been initialised or notebooks are scaffolds
        id: guard
        run: |
          # {{ZENODO_DOI}} is documented to remain unsubstituted until the first
          # GitHub release mints the concept DOI — so don't treat it as a blocker.
          # See docs/fair4rs-checklist.md.
          placeholder_files=$(grep -rln '{{[A-Z_]\+}}' . --include='*.md' --include='*.yml' --include='*.yaml' --include='*.json' --include='*.cff' --include='*.py' --include='*.toml' 2>/dev/null \
            | grep -v 'claude/skills/init-template/' \
            | while read f; do
                if grep -oE '\{\{[A-Z_]+\}\}' "$f" | grep -qv '{{ZENODO_DOI}}'; then
                  echo "$f"
                fi
              done)
          scaffold_files=$(grep -lE 'raise NotImplementedError|"<dataset-name>"|# Example skeleton — adapt' notebooks/*.py 2>/dev/null || true)
          if [ -n "$placeholder_files" ]; then
            echo "::notice::Template placeholders detected ({{...}} tokens). Run /init-template inside Claude Code (or substitute manually) before CI runs meaningfully. Skipping the rest of this workflow."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$scaffold_files" ]; then
            echo "::notice::Notebooks are still in scaffold state — replace placeholders in notebooks/*.py with your actual replication code (Phase 2). The Snakefile rule outputs will not be produced until then. Skipping pipeline run."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pixi
        if: steps.guard.outputs.skip != 'true'
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          pixi-version: v0.68.1
          locked: true
          cache: true

      # ----- credentials (uncomment + add the matching GitHub secret) -----
      # Fast path: instead of re-running the credentialled multi-GB CMEMS/EEA
      # downloads (notebooks 01+02), pull the pinned intermediates from the
      # Zenodo data deposit and run only analysis + figures (03+04). No secrets,
      # no large downloads. The from-source path (01+02) is exercised locally /
      # on demand; see scripts/fetch_intermediates.py and DATA_PROVENANCE.md.

      - name: Notebooks parse (jupytext round-trip, no execution)
        if: steps.guard.outputs.skip != 'true'
        run: |
          for nb in notebooks/*.py; do
            pixi run jupytext --to notebook "$nb" -o "/tmp/$(basename "${nb%.py}").ipynb"
          done

      - name: Fetch pinned intermediates from Zenodo
        if: steps.guard.outputs.skip != 'true'
        run: pixi run python scripts/fetch_intermediates.py

      - name: Run analysis + figures
        if: steps.guard.outputs.skip != 'true'
        run: |
          pixi run jupytext --to notebook --execute notebooks/03_analysis.py
          pixi run jupytext --to notebook --execute notebooks/04_figures.py

      - name: Upload results
        if: always() && steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ci-outputs
          path: |
            results/
            figures/
