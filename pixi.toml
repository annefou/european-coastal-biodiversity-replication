# Single source of truth for the runtime — used by local dev, Docker, and CI.
# Add every dependency a notebook imports here. Local "kitchen-sink" envs
# (e.g. pangeo) hide missing deps; CI builds strictly from this file and will
# silently produce empty notebook cells if anything is missing.
#
# pixi.lock (committed alongside this file) pins every package to an exact
# build hash per platform. Regenerate it with `pixi install` after editing
# this file; commit both files in the same commit.

[workspace]
name = "european-coastal-biodiversity-replication"
# bioconda hosts snakemake (and downstream rule-engine ecosystem); conda-forge
# is the priority channel for everything else.
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", "osx-arm64", "win-64"]

[dependencies]
python = "3.12.*"
# --- core scientific stack ---
numpy = "*"
pandas = ">=2.0"
xarray = ">=2024.6"
scipy = "*"
matplotlib = "*"
pyarrow = "*"
# --- notebook execution + Jupyter Book ---
jupytext = "*"
jupyterlab = "*"
nbclient = "*"
ipykernel = "*"
# --- pipeline driver ---
snakemake = "*"

# --- study-specific: wave + atmospheric data access ---
copernicusmarine = "*"       # CMEMS waves (WAVERYS, IBI, NWS, MED) — needs ~/.copernicusmarine credentials
cdsapi = "*"                 # ERA5 winds for context maps and storm-track figures

# --- study-specific: gridded I/O and parallelism ---
netcdf4 = "*"                # NetCDF I/O — preferred over .npz for arrays (see DOMAIN.md)
dask = "*"                   # out-of-core / parallel — CMEMS slices are large

# --- study-specific: vector + geographic plotting ---
geopandas = "*"              # Natura 2000 polygons + SDF joins
pyogrio = "*"                # faster geopandas reader for GPKG / shapefile
cartopy = "*"                # regional storm-basin maps
pyproj = "*"                 # CRS + map projections

# --- study-specific: regridding ---
# xesmf depends on the ESMF C library. If it fails to solve on a platform,
# fall back to xarray.interp (already in xarray) — bilinear-only but
# adequate for inter-product comparison at site polygons.
xesmf = "*"

# Pip-only deps go in [pypi-dependencies]. Conda-forge is preferred where available.
[pypi-dependencies]
pygbif = "*"                 # GBIF occurrence DOIs (sanity-check overlays only)

[feature.docs.dependencies]
mystmd = "*"

[feature.tests.dependencies]
pytest = "*"

[environments]
default = { solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
tests = { features = ["tests"], solve-group = "default" }

[tasks]
run = "snakemake --cores 1"
book = "myst build --html"
lab = "jupyter lab"
